<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cascadia+Mono:ital,wght@0,200..700;1,200..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./public/css/main.css">
  <title>Tecktronics Project</title>
</head>
<body>
  <div class="container">

    <!---- shopping section slide in ---->

    <div class="shopping-section">
      <div class="cart-content"></div>
    </div>
    <header>
      <h1>Tecktronics</h1>
      <button aria-label="cart-btn" class="bag-btn">
          <i class="bi bi-bag"></i>
          <span class="input" id="bag-output">0</span>
      </button>
    </header>

    <article class="product-card">
      <div class="product-card-content">
          <img class="card-image" src="./public/assets/images/pexels-dlxmedia-hu-maccbook.png" alt="image of laptop">
        <div class="card-text-content">
          <h3 class="product-title" >Macbook</h3>
          <p class="sub-title">laptop</p>
          <p class="product-price">$899</p>
        </div>
      <!---- btn-content ---->
        <div class="btn-content">
            <button aria-label="item-btn" data-item-id="1" class="item-btn" >Add To Bag</button>
        </div>
       <!---- btn-content ---->
       </div>
    </article>



    <article class="product-card">
      <div class="product-card-content">
          <img class="card-image" src="./public/assets/images/andrey-matveev-msartwatch-unsplash.png" alt="image of smartwatch">
        <div class="card-text-content">
          <h3 class="product-title">Android</h3>
          <p class="sub-title">smartwatch</p>
          <p class="product-price">$399</p>
        </div>
      
      <!---- btn-content ---->
        <div class="btn-content">
            <button aria-label="item-btn" data-item-id="2" class="item-btn">Add To Bag</button>
      
      <!---- btn-content ---->
      </div>
    </article>


  </div>
  <script src="./public/js/script.js"></script>
</body>
</html>
